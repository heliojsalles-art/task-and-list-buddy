workflows:
  ios_sideloadly_unsigned:
    name: iOS (Unsigned IPA + XCARCHIVE) - Sideloadly
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      xcode: latest
      cocoapods: default
      node: 18
      vars:
        APP_NAME: "Organiza"
        APP_ID: "com.salles.organiza"
        WEB_DIR: "dist"
        IOS_MIN_VERSION: "16.0"

    scripts:
      - name: Install dependencies (npm install)
        script: |
          set -e
          npm install

      - name: Build Web App (Vite)
        script: |
          set -e
          npm run build
          ls -lah "${WEB_DIR}" || true

      - name: Ensure Capacitor deps + base config
        script: |
          set -e
          npm install @capacitor/core @capacitor/cli @capacitor/ios

          if [ ! -d "${WEB_DIR}" ]; then
            echo "WARN: ${WEB_DIR} não existe. Usando webDir='.'"
            WEB_DIR="."
          fi

          cat > capacitor.config.json <<EOF
          {
            "appId": "${APP_ID}",
            "appName": "${APP_NAME}",
            "webDir": "${WEB_DIR}",
            "bundledWebRuntime": false
          }
          EOF

      - name: Create iOS project (if missing) and set minimum iOS version
        script: |
          set -e

          # cria ios se não existir
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

          # Ajusta o Podfile ANTES do sync (porque sync chama pod install)
          PODFILE="ios/App/Podfile"
          if [ -f "${PODFILE}" ]; then
            if grep -q "platform :ios" "${PODFILE}"; then
              sed -i '' "s/platform :ios, '.*'/platform :ios, '${IOS_MIN_VERSION}'/" "${PODFILE}"
            else
              sed -i '' "1s/^/platform :ios, '${IOS_MIN_VERSION}'\n/" "${PODFILE}"
            fi
          fi

          # Também ajusta o deployment target no Xcode project (ajuda a evitar conflitos)
          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"
          if [ -f "${PBXPROJ}" ]; then
            # troca qualquer IPHONEOS_DEPLOYMENT_TARGET existente para o mínimo desejado
            sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = ${IOS_MIN_VERSION};/g" "${PBXPROJ}" || true
          fi

      - name: Capacitor sync iOS (now pods should work)
        script: |
          set -e
          npx cap sync ios

      - name: Xcode archive (unsigned)
        script: |
          set -e
          cd ios/App

          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            | tee ../../xcodebuild-archive.log

          cd ../..

      - name: Create IPA manually (unsigned, for Sideloadly)
        script: |
          set -e
          rm -rf Payload
          rm -f "${APP_NAME}.ipa"

          mkdir -p Payload
          cp -R ios/App/build/App.xcarchive/Products/Applications/App.app "Payload/${APP_NAME}.app"

          if [ ! -f "Payload/${APP_NAME}.app/Info.plist" ]; then
            echo "ERRO: Info.plist não encontrado dentro do .app. Archive inválido."
            exit 1
          fi

          /usr/bin/ditto -c -k --sequesterRsrc --keepParent Payload "${APP_NAME}.ipa"
          rm -rf Payload

    artifacts:
      - "*.ipa"
      - "ios/App/build/*.xcarchive"
      - "xcodebuild-archive.log"
      - "ios/App/Podfile.lock"
