workflows:
  ios-build-unsigned:
    name: iOS Unsigned IPA (for Sideloadly)

    environment:
      max_build_duration: 60
      xcode: latest
      node: 18

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:

      - name: Install dependencies
        script: |
          npm install

      - name: Build Web App
        script: |
          npm run build

      - name: Install Capacitor iOS
        script: |
          npx cap add ios || true
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
          cd ../..

      - name: Build iOS Archive (Unsigned)
        script: |
          cd ios/App

          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY=""

          cd ../..

      - name: Create IPA manually
        script: |
          mkdir Payload
          cp -R ios/App/build/App.xcarchive/Products/Applications/App.app Payload/Organiza.app

          /usr/bin/zip -r Organiza.ipa Payload

          rm -rf Payload

    artifacts:
      - Organiza.ipa
