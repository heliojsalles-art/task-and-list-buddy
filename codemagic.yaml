- name: Xcode Build Unsigned
  script: |
    cd ios/App
    ARCHIVE_PATH="./output/App.xcarchive"
    IPA_PATH="../../Organiza.ipa"
    
    # 1. Archive the build
    xcodebuild archive \
      -workspace App.xcworkspace \
      -scheme App \
      -configuration Release \
      -destination generic/platform=iOS \
      -archivePath "$ARCHIVE_PATH" \
      SKIP_INSTALL=NO \
      CODE_SIGNING_ALLOWED=NO \
      CODE_SIGNING_REQUIRED=NO \
      CODE_SIGNING_IDENTITY="" \
      AD_HOC_CODE_SIGNING_ALLOWED=YES

    # Check if archive was successful
    if [ ! -d "$ARCHIVE_PATH" ]; then
      echo "Error: Xcode archive failed"
      exit 1
    fi

    # 2. Export the archive to an IPA (using an Ad-Hoc ExportOptions plist for unsigned export)
    # Create a minimal export options plist file on the fly
    cat <<EOF > ExportOptions.plist
    <?xml version="1.0" encoding="UTF-8"?>
    <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com">
    <plist version="1.0">
    <dict>
      <key>method</key>
      <string>ad-hoc</string>
      <key>signingStyle</key>
      <string>manual</string>
      <key>stripSwiftSymbols</key>
      <true/>
      <key>uploadBitcode</key>
      <false/>
      <key>uploadSymbols</key>
      <false/>
    </dict>
    </plist>
    EOF

    xcodebuild -exportArchive \
      -archivePath "$ARCHIVE_PATH" \
      -exportOptionsPlist ExportOptions.plist \
      -exportPath "../.."
    
    # Check if IPA was created
    if [ ! -f "$IPA_PATH" ]; then
        echo "Error: IPA not created"
        exit 1
    fi

    echo "IPA successfully created at $IPA_PATH"
