workflows:
  ios_sideloadly_unsigned:
    name: iOS (Unsigned IPA + XCARCHIVE) - Sideloadly
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      xcode: latest
      cocoapods: default
      node: 18
      vars:
        APP_NAME: "Organiza"
        APP_ID: "com.salles.organiza"
        WEB_DIR: "dist"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    cache:
      cache_paths:
        - ~/.npm
        - ios/App/Pods
        - ios/App/Podfile.lock

    scripts:
      - name: Install dependencies (npm install)
        script: |
          set -e
          npm install

      - name: Build Web App (Vite)
        script: |
          set -e
          npm run build
          ls -lah "${WEB_DIR}" || true

      - name: Ensure Capacitor deps + configure
        script: |
          set -e

          # Garante Capacitor instalado (caso não esteja no package.json)
          npm install @capacitor/core @capacitor/cli @capacitor/ios

          # Cria capacitor.config.json (usa dist por padrão, mas cai pra "." se não existir)
          if [ ! -d "${WEB_DIR}" ]; then
            echo "WARN: ${WEB_DIR} não existe. Usando webDir='.'"
            WEB_DIR="."
          fi

          cat > capacitor.config.json <<EOF
          {
            "appId": "${APP_ID}",
            "appName": "${APP_NAME}",
            "webDir": "${WEB_DIR}",
            "bundledWebRuntime": false
          }
          EOF

      - name: Capacitor sync iOS
        script: |
          set -e

          # Cria iOS se não existir
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

          npx cap sync ios

      - name: CocoaPods install
        script: |
          set -e
          cd ios/App

          # Força iOS 15 no Podfile (evita warnings/erros de target baixo)
          if [ -f "Podfile" ]; then
            # Se já tiver platform :ios, ajusta; se não tiver, insere no topo.
            if grep -q "platform :ios" Podfile; then
              sed -i '' "s/platform :ios, '.*'/platform :ios, '15.0'/" Podfile
            else
              sed -i '' "1s/^/platform :ios, '15.0'\n/" Podfile
            fi
          fi

          pod install --repo-update
          cd ../..

      - name: Xcode archive (unsigned)
        script: |
          set -e
          cd ios/App

          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            | tee ../../xcodebuild-archive.log

          cd ../..

      - name: Create IPA manually (unsigned, for Sideloadly)
        script: |
          set -e

          rm -rf Payload
          rm -f "${APP_NAME}.ipa"

          mkdir -p Payload

          # Copia o .app do archive
          cp -R ios/App/build/App.xcarchive/Products/Applications/App.app "Payload/${APP_NAME}.app"

          # Validação mínima: Info.plist precisa existir
          if [ ! -f "Payload/${APP_NAME}.app/Info.plist" ]; then
            echo "ERRO: Info.plist não encontrado dentro do .app. Archive inválido."
            find Payload -maxdepth 3 -type f | head -n 50 || true
            exit 1
          fi

          /usr/bin/ditto -c -k --sequesterRsrc --keepParent Payload "${APP_NAME}.ipa"
          rm -rf Payload

      - name: Print artifact info
        script: |
          set -e
          ls -lah *.ipa || true
          du -h *.ipa || true
          ls -lah ios/App/build || true

    artifacts:
      - "*.ipa"
      - "ios/App/build/*.xcarchive"
      - "xcodebuild-archive.log"
      - "ios/App/Podfile.lock"
