workflows:
  build-ios-organiza:
    name: Build iOS Organiza
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install and Build Web
        script: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npm run build

      - name: Capacitor Setup
        script: |
          WEB_DIR="dist"
          # Verifica se a pasta dist existe (padrão Vite/Lovable), senão usa a raiz
          [ ! -d "dist" ] && WEB_DIR="."
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.salles.organiza",
            "appName": "Organiza",
            "webDir": "$WEB_DIR"
          }
          EOF
          rm -rf ios
          # --no-update impede que o Capacitor tente rodar 'pod install' antes da hora
          npx cap add ios --no-update
          npx cap copy ios

      - name: Update App Icons
        script: |
          ICON_DEST="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICON_DEST"
          if [ -f "Assets/icon.png" ]; then
            cp Assets/icon.png "$ICON_DEST/AppIcon-1024x1024@1x.png"
          elif [ -f "assets/icon.png" ]; then
            cp assets/icon.png "$ICON_DEST/AppIcon-1024x1024@1x.png"
          fi
          cat <<EOF > "$ICON_DEST/Contents.json"
          {
            "images": [
              {
                "size": "1024x1024",
                "idiom": "ios-marketing",
                "filename": "AppIcon-1024x1024@1x.png",
                "scale": "1x"
              }
            ],
            "info": {
              "version": 1,
              "author": "xcode"
            }
          }
          EOF

      - name: Fix and Install Pods
        script: |
          cd ios/App
          # Atualiza o target do projeto Xcode para iOS 15.0 para compatibilidade
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 14.0/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' App.xcodeproj/project.pbxproj
          
          # Sobrescreve o Podfile com a versão correta
          echo "platform :ios, '15.0'
          use_frameworks!
          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end" > Podfile
          
          # Agora o CocoaPods aceitará a instalação
          pod update

      - name: Xcode Build Unsigned (Archive & Export)
        script: |
          cd ios/App
          
          # Cria arquivo de opções para exportar IPA sem assinatura oficial
          cat <<EOF > ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>thinning</key>
              <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF

          # Gera o Archive (pacote completo do app)
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          # Exporta o Archive para o arquivo .ipa final
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ \
            CODE_SIGNING_ALLOWED=NO

          # Move para a raiz para o Codemagic salvar como artefato
          mv build/App.ipa ../../Organiza.ipa

    artifacts:
      - "*.ipa"
